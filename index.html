<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>연기공간 — 내 주변 흡연구역 찾기</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a2027">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="연기공간">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
  :root {
    --bg: #101418;
    --panel: #1a2027;
    --panel2: #222a33;
    --text: #e8edf2;
    --muted: #8a97a5;
    --accent: #ff7a45;
    --accent-dim: rgba(255,122,69,.15);
    --green: #4ade80;
    --naver: #03c75a;
    --blue: #2f6fef;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Pretendard', -apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid #2b3540;
    z-index: 1000;
    flex-shrink: 0;
  }
  header .logo {
    width: 34px; height: 34px;
    background: var(--accent-dim);
    border-radius: 10px;
    display: grid; place-items: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 700; letter-spacing: -.02em; }
  header p  { font-size: 11px; color: var(--muted); margin-top: 1px; }
  header .spacer { flex: 1; }

  .radius-select {
    background: var(--panel2);
    color: var(--text);
    border: 1px solid #333f4c;
    border-radius: 9px;
    padding: 7px 10px;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  .btn-locate {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: transform .1s, opacity .2s;
    flex-shrink: 0;
  }
  .btn-locate:active { transform: scale(.96); }
  .btn-locate:disabled { opacity: .5; cursor: wait; }

  /* 검색 바 */
  .searchbar {
    position: relative;
    display: flex;
    gap: 8px;
    padding: 8px 16px 10px;
    background: var(--panel);
    border-bottom: 1px solid #2b3540;
    z-index: 999;
    flex-shrink: 0;
  }
  .searchbar input {
    flex: 1;
    background: var(--panel2);
    border: 1px solid #333f4c;
    border-radius: 10px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 13.5px;
    outline: none;
  }
  .searchbar input:focus { border-color: var(--accent); }
  .searchbar button {
    background: var(--panel2);
    border: 1px solid #333f4c;
    border-radius: 10px;
    color: var(--text);
    padding: 0 14px;
    font-size: 15px;
    cursor: pointer;
  }
  .searchbar button:hover { border-color: var(--accent); }
  #searchResults {
    display: none;
    position: absolute;
    top: calc(100% - 4px);
    left: 16px; right: 16px;
    background: var(--panel2);
    border: 1px solid #333f4c;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
    z-index: 1500;
  }
  #searchResults.show { display: block; }
  .sr-item {
    padding: 11px 14px;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 1px solid #2b3540;
    line-height: 1.4;
  }
  .sr-item:last-child { border-bottom: none; }
  .sr-item:hover { background: #2a3440; }
  .sr-item .sub { color: var(--muted); font-size: 11.5px; margin-top: 2px; }
  .sr-item.muted { color: var(--muted); cursor: default; }

  main { flex: 1; display: flex; min-height: 0; }
  #mapWrap { flex: 1; min-width: 0; position: relative; }
  #map { width: 100%; height: 100%; background: #e8eaed; }

  /* 지도 위 경로 정보 바 */
  #routeBar {
    display: none;
    position: absolute;
    left: 50%; bottom: 18px;
    transform: translateX(-50%);
    background: rgba(20,26,32,.95);
    backdrop-filter: blur(8px);
    border: 1px solid #333f4c;
    border-radius: 14px;
    padding: 10px 14px;
    z-index: 500;
    box-shadow: 0 10px 32px rgba(0,0,0,.45);
    max-width: calc(100% - 24px);
    white-space: nowrap;
  }
  #routeBar.show { display: flex; align-items: center; gap: 10px; }
  #routeBar .walk { font-size: 14px; font-weight: 700; color: var(--green); }
  #routeBar .dist { font-size: 12px; color: var(--muted); }
  #routeBar a {
    font-size: 12px;
    font-weight: 600;
    text-decoration: none;
    border-radius: 8px;
    padding: 6px 10px;
    color: #fff;
  }
  #routeBar a.naver { background: var(--naver); }
  #routeBar a.kakao { background: #fee500; color: #191919; }
  #routeBar .close {
    background: none; border: none; color: var(--muted);
    font-size: 15px; cursor: pointer; padding: 0 2px;
  }

  #authFail {
    display: none;
    position: absolute; inset: 0;
    background: var(--bg);
    z-index: 600;
    padding: 40px 24px;
    text-align: center;
    font-size: 13.5px;
    line-height: 1.9;
    color: var(--muted);
  }
  #authFail b { color: var(--accent); }

  aside {
    width: 340px;
    flex-shrink: 0;
    background: var(--panel);
    border-left: 1px solid #2b3540;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  aside .list-head {
    padding: 14px 16px 10px;
    border-bottom: 1px solid #2b3540;
    flex-shrink: 0;
  }
  aside .list-head h2 { font-size: 14px; font-weight: 700; }
  aside .list-head span { color: var(--accent); }
  aside .list-head p { font-size: 12px; color: var(--muted); margin-top: 3px; }

  #results {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #results::-webkit-scrollbar { width: 6px; }
  #results::-webkit-scrollbar-thumb { background: #333f4c; border-radius: 3px; }

  .card {
    background: var(--panel2);
    border: 1px solid #2e3944;
    border-radius: var(--radius);
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .card:hover, .card.active {
    border-color: var(--accent);
    background: #27303a;
  }
  .card .row1 { display: flex; align-items: baseline; gap: 8px; }
  .card .num {
    flex-shrink: 0;
    width: 20px; height: 20px;
    background: var(--accent);
    color: #fff;
    border-radius: 6px;
    font-size: 11.5px; font-weight: 700;
    display: grid; place-items: center;
    align-self: flex-start;
  }
  .card .num.gov { background: #38bdf8; }
  .card .name { font-size: 14px; font-weight: 600; flex: 1; line-height: 1.35; }
  .card .dist { font-size: 13px; font-weight: 700; color: var(--accent); white-space: nowrap; }
  .card .meta {
    margin-top: 6px;
    font-size: 12px; color: var(--muted);
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .card .tag {
    background: #1a2027;
    border: 1px solid #333f4c;
    border-radius: 6px;
    padding: 2px 7px;
  }
  .card .walk { color: var(--green); }
  .card .links { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
  .card .links a {
    font-size: 11.5px;
    color: var(--text);
    text-decoration: none;
    background: #1a2027;
    border: 1px solid #333f4c;
    border-radius: 7px;
    padding: 4px 9px;
    transition: border-color .15s;
  }
  .card .links a:hover { border-color: var(--accent); color: var(--accent); }
  .card .links a.nv { border-color: #1e7a44; color: #4ade80; }

  .empty, .loading {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.7;
  }
  .empty .big { font-size: 34px; margin-bottom: 10px; }

  #toast {
    position: fixed;
    bottom: 22px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #2b3540;
    color: var(--text);
    padding: 11px 18px;
    border-radius: 12px;
    font-size: 13px;
    box-shadow: 0 8px 30px rgba(0,0,0,.45);
    z-index: 2000;
    transition: transform .3s cubic-bezier(.2,.9,.3,1.2);
    max-width: 88vw;
    text-align: center;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* 지도 마커 (HTML 아이콘) */
  .me-wrap { position: relative; width: 22px; height: 22px; }
  .me-pulse {
    position: absolute; inset: -14px;
    border-radius: 50%;
    background: rgba(47,111,239,.3);
    animation: mePulse 2s ease-out infinite;
  }
  @keyframes mePulse {
    0% { transform: scale(.4); opacity: 1; }
    100% { transform: scale(1.4); opacity: 0; }
  }
  .me-dot {
    position: absolute; inset: 0;
    background: var(--blue);
    border: 3.5px solid #fff;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,.4);
  }
  .me-label {
    position: absolute;
    top: -26px; left: 50%;
    transform: translateX(-50%);
    background: var(--blue);
    color: #fff;
    font-size: 11px; font-weight: 700;
    padding: 3px 8px;
    border-radius: 7px;
    white-space: nowrap;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
  }
  .pin {
    width: 30px; height: 30px;
    background: var(--accent);
    border: 2.5px solid #fff;
    border-radius: 50% 50% 50% 4px;
    transform: rotate(-45deg);
    display: grid; place-items: center;
    box-shadow: 0 3px 10px rgba(0,0,0,.4);
    cursor: pointer;
  }
  .pin span {
    transform: rotate(45deg);
    color: #fff;
    font-size: 12.5px;
    font-weight: 800;
  }
  .pin.gov { background: #38bdf8; }
  .pin.sel {
    background: var(--naver);
    width: 38px; height: 38px;
    border-width: 3px;
    z-index: 200;
  }
  .pin.sel span { font-size: 15px; }
  .iw {
    background: var(--panel2);
    color: var(--text);
    border: 1px solid #333f4c;
    border-radius: 12px;
    padding: 10px 13px;
    font-size: 13px;
    line-height: 1.55;
    font-family: 'Pretendard', -apple-system, 'Malgun Gothic', sans-serif;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
    max-width: 240px;
  }
  .iw b { color: var(--accent); }
  .iw .g { color: var(--green); font-weight: 700; }

  /* 위치 권한 안내 모달 */
  #permModal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 3000;
    display: none;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  #permModal.show { display: flex; }
  #permModal .box {
    background: var(--panel);
    border: 1px solid #333f4c;
    border-radius: 18px;
    padding: 22px 20px;
    max-width: 360px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  #permModal h3 { font-size: 16px; margin-bottom: 4px; }
  #permModal .sub { font-size: 12.5px; color: var(--muted); margin-bottom: 14px; }
  #permModal ol { margin: 0 0 16px 18px; font-size: 13.5px; line-height: 2; }
  #permModal ol b { color: var(--accent); }
  #permModal .btns { display: flex; gap: 8px; }
  #permModal button {
    flex: 1;
    border: none;
    border-radius: 10px;
    padding: 11px 0;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
  }
  #permModal .retry { background: var(--accent); color: #fff; }
  #permModal .close { background: var(--panel2); color: var(--text); border: 1px solid #333f4c; }

  @media (max-width: 720px) {
    main { flex-direction: column; }
    #mapWrap { flex: 1.25; }
    aside {
      width: 100%;
      flex: 1;
      border-left: none;
      border-top: 1px solid #2b3540;
    }
    header h1 { font-size: 14px; }
    header p { display: none; }
    #routeBar { bottom: 12px; padding: 8px 11px; gap: 8px; }
    #routeBar .walk { font-size: 13px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🚬</div>
  <div>
    <h1>연기공간</h1>
    <p>내 주변 흡연구역 찾기</p>
  </div>
  <div class="spacer"></div>
  <select class="radius-select" id="radiusSel">
    <option value="500">반경 500m</option>
    <option value="1000" selected>반경 1km</option>
    <option value="2000">반경 2km</option>
    <option value="3000">반경 3km</option>
  </select>
  <button class="btn-locate" id="btnLocate">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
    내 위치
  </button>
</header>

<div class="searchbar">
  <input id="searchInput" placeholder="장소·주소 검색 (예: 강남역, 홍대입구역)" autocomplete="off">
  <button id="searchBtn">🔍</button>
  <div id="searchResults"></div>
</div>

<main>
  <div id="mapWrap">
    <div id="map"></div>
    <div id="routeBar">
      <span class="walk" id="rbWalk"></span>
      <span class="dist" id="rbDist"></span>
      <a class="naver" id="rbNaver" target="_blank" rel="noopener">네이버 도보</a>
      <a class="kakao" id="rbKakao" target="_blank" rel="noopener">카카오맵</a>
      <button class="close" id="rbClose">✕</button>
    </div>
    <div id="authFail">
      <div style="font-size:36px;margin-bottom:12px">🗺️</div>
      네이버 지도 인증에 실패했어요.<br>
      NCP 콘솔 → Application 설정의 <b>Web 서비스 URL</b>에<br>
      <b>이 사이트 주소</b>가 등록되어 있는지 확인해 주세요.
    </div>
  </div>
  <aside>
    <div class="list-head">
      <h2>주변 흡연구역 <span id="count">–</span></h2>
      <p id="statusLine">위치를 확인하는 중…</p>
    </div>
    <div id="results">
      <div class="loading">⏳ 지도를 불러오는 중…</div>
    </div>
  </aside>
</main>

<div id="toast"></div>

<div id="permModal">
  <div class="box">
    <h3>📍 위치 권한이 꺼져 있어요</h3>
    <p class="sub">이전에 "차단"을 선택하면 브라우저가 팝업을 다시 띄우지 않아요. 아래처럼 해제한 뒤 다시 시도해 주세요.</p>
    <ol id="permSteps"></ol>
    <div class="btns">
      <button class="retry" id="permRetry">권한 허용했어요, 다시 시도</button>
      <button class="close" id="permClose">지도에서 직접 선택</button>
    </div>
  </div>
</div>

<script>
const NCP_KEY = '4gewyu6a4h';
const DEFAULT_POS = { lat: 37.5665, lng: 126.9780 };
const OVERPASS_ENDPOINTS = [
  'https://overpass-api.de/api/interpreter',
  'https://overpass.kumi.systems/api/interpreter',
];

let map, meMarker, searchCircle, routeLine, infoWin;
let spotMarkers = [];
let currentSpots = [];
let currentPos = null;
let searching = false;
let selectedIdx = -1;

const $ = (id) => document.getElementById(id);

/* ── 공공데이터 로드 ── */
let koreaSpots = [];
fetch('korea-spots.json')
  .then((r) => r.ok ? r.json() : null)
  .then((d) => {
    if (d && d.spots) {
      koreaSpots = d.spots;
      if (currentPos && !searching) searchSpots();
    }
  })
  .catch(() => {});

/* ── 서비스 워커 ── */
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

/* ── 네이버 지도 로드 (신규 ncpKeyId → 실패 시 구형 ncpClientId 재시도) ── */
let triedOldParam = false;
window.navermap_authFailure = function () {
  if (!triedOldParam) {
    triedOldParam = true;
    loadNaver('ncpClientId');
  } else {
    $('authFail').style.display = 'block';
    $('results').innerHTML = '<div class="empty"><div class="big">🗺️</div>지도 인증 실패<br>NCP 콘솔에서 Web 서비스 URL을 확인해 주세요.</div>';
  }
};
function loadNaver(param) {
  const s = document.createElement('script');
  s.src = `https://oapi.map.naver.com/openapi/v3/maps.js?${param}=${NCP_KEY}`;
  s.onload = () => { if (window.naver && naver.maps) initApp(); };
  document.head.appendChild(s);
}
loadNaver('ncpKeyId');

/* ── 토스트 ── */
let toastTimer;
function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

/* ── 앱 초기화 (지도 준비 후) ── */
function initApp() {
  map = new naver.maps.Map('map', {
    center: new naver.maps.LatLng(DEFAULT_POS.lat, DEFAULT_POS.lng),
    zoom: 15,
    minZoom: 7,
    mapDataControl: false,
    scaleControl: false,
    logoControlOptions: { position: naver.maps.Position.BOTTOM_LEFT },
  });
  infoWin = new naver.maps.InfoWindow({
    content: '',
    borderWidth: 0,
    backgroundColor: 'transparent',
    disableAnchor: true,
    pixelOffset: new naver.maps.Point(0, -12),
  });
  naver.maps.Event.addListener(map, 'click', (e) => {
    setPosition(e.coord.lat(), e.coord.lng(), '지도에서 선택한 위치');
  });
  locateMe();
}

/* ── 위치 설정 + 검색 ── */
function setPosition(lat, lng, label) {
  currentPos = { lat, lng };
  clearRoute();
  if (meMarker) meMarker.setMap(null);
  meMarker = new naver.maps.Marker({
    position: new naver.maps.LatLng(lat, lng),
    map,
    zIndex: 300,
    icon: {
      content: `<div class="me-wrap"><div class="me-pulse"></div><div class="me-dot"></div><div class="me-label">${label === '내 위치' ? '내 위치' : '검색 위치'}</div></div>`,
      anchor: new naver.maps.Point(11, 11),
    },
  });
  map.setCenter(new naver.maps.LatLng(lat, lng));
  if (map.getZoom() < 14) map.setZoom(15);
  searchSpots();
}

/* ── 위치 권한 안내 ── */
function permSteps() {
  const ua = navigator.userAgent;
  if (/iPhone|iPad/.test(ua)) {
    return [
      '아이폰 <b>설정</b> 앱 → <b>개인정보 보호 및 보안</b> → <b>위치 서비스</b> 켜기',
      '같은 화면에서 <b>Safari 웹사이트</b> → <b>앱을 사용하는 동안</b> 선택',
      'Safari 주소창 왼쪽 <b>ᴀA</b> → <b>웹사이트 설정</b> → 위치 <b>허용</b>',
    ];
  }
  if (/Android/.test(ua)) {
    return [
      '주소창 왼쪽 <b>자물쇠(🔒)</b> 아이콘 탭',
      '<b>권한</b> → <b>위치</b> → <b>허용</b>',
      '휴대폰 설정에서 <b>위치(GPS)</b>가 켜져 있는지 확인',
    ];
  }
  return [
    '주소창 왼쪽 <b>자물쇠(🔒)</b> 아이콘 클릭',
    '<b>사이트 설정</b> → <b>위치</b> → <b>허용</b>으로 변경',
    '페이지 새로고침 후 다시 시도',
  ];
}
function showPermGuide() {
  $('permSteps').innerHTML = permSteps().map((s) => `<li>${s}</li>`).join('');
  $('permModal').classList.add('show');
}
$('permRetry').addEventListener('click', () => {
  $('permModal').classList.remove('show');
  locateMe(true);
});
$('permClose').addEventListener('click', () => {
  $('permModal').classList.remove('show');
  toast('지도를 클릭하면 그 지점 주변을 검색해요');
});

/* ── 현재 위치 ── */
async function locateMe(retry) {
  const btn = $('btnLocate');
  btn.disabled = true;
  $('statusLine').textContent = '위치를 확인하는 중…';
  if (!navigator.geolocation) {
    toast('이 브라우저는 위치 기능을 지원하지 않아요.');
    btn.disabled = false;
    setPosition(DEFAULT_POS.lat, DEFAULT_POS.lng, '기본 위치 (서울시청)');
    return;
  }
  if (navigator.permissions && navigator.permissions.query) {
    try {
      const st = await navigator.permissions.query({ name: 'geolocation' });
      if (st.state === 'denied') {
        btn.disabled = false;
        $('statusLine').textContent = '위치 권한 차단됨';
        showPermGuide();
        if (!currentPos) setPosition(DEFAULT_POS.lat, DEFAULT_POS.lng, '기본 위치 (서울시청)');
        return;
      }
    } catch (e) {}
  }
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      btn.disabled = false;
      setPosition(pos.coords.latitude, pos.coords.longitude, '내 위치');
      toast('📍 현재 위치를 찾았어요');
    },
    (err) => {
      btn.disabled = false;
      if (err.code === 1) {
        $('statusLine').textContent = '위치 권한 차단됨';
        showPermGuide();
        if (!currentPos) setPosition(DEFAULT_POS.lat, DEFAULT_POS.lng, '기본 위치 (서울시청)');
        return;
      }
      toast(err.code === 3 ? '위치 확인 시간 초과 — 다시 시도해 주세요' : '위치를 가져올 수 없어요');
      if (!currentPos) setPosition(DEFAULT_POS.lat, DEFAULT_POS.lng, '기본 위치 (서울시청)');
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: retry ? 0 : 60000 }
  );
}
$('btnLocate').addEventListener('click', () => locateMe());
$('radiusSel').addEventListener('change', () => { if (currentPos) searchSpots(); });

/* ── 장소 검색 (Nominatim 지오코딩) ── */
async function doSearch() {
  const q = $('searchInput').value.trim();
  const box = $('searchResults');
  if (!q) { box.classList.remove('show'); return; }
  box.innerHTML = '<div class="sr-item muted">🔎 검색 중…</div>';
  box.classList.add('show');
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&countrycodes=kr&accept-language=ko&limit=6&q=${encodeURIComponent(q)}`);
    const list = await res.json();
    if (!list.length) {
      box.innerHTML = '<div class="sr-item muted">결과가 없어요 — 역/동/건물명으로 다시 검색해 보세요</div>';
      return;
    }
    box.innerHTML = '';
    list.forEach((r) => {
      const parts = r.display_name.split(',').map((v) => v.trim());
      const title = parts[0];
      const sub = parts.slice(1, 4).join(' ');
      const el = document.createElement('div');
      el.className = 'sr-item';
      el.innerHTML = `${title}<div class="sub">${sub}</div>`;
      el.addEventListener('click', () => {
        box.classList.remove('show');
        $('searchInput').value = title;
        setPosition(parseFloat(r.lat), parseFloat(r.lon), title);
      });
      box.appendChild(el);
    });
  } catch (e) {
    box.innerHTML = '<div class="sr-item muted">검색 실패 — 잠시 후 다시 시도해 주세요</div>';
  }
}
$('searchBtn').addEventListener('click', doSearch);
$('searchInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });
document.addEventListener('click', (e) => {
  if (!e.target.closest('.searchbar')) $('searchResults').classList.remove('show');
});

/* ── 거리/시간 ── */
function distM(a, b) {
  const R = 6371000, toR = Math.PI / 180;
  const dLat = (b.lat - a.lat) * toR, dLng = (b.lng - a.lng) * toR;
  const h = Math.sin(dLat/2)**2 + Math.cos(a.lat*toR) * Math.cos(b.lat*toR) * Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(h));
}
const fmtDist = (m) => m < 1000 ? `${Math.round(m)}m` : `${(m/1000).toFixed(1)}km`;
const walkMin = (m) => Math.max(1, Math.round(m / 67));

/* ── 흡연구역 검색 ── */
async function searchSpots() {
  if (!currentPos || searching) return;
  searching = true;
  const radius = +$('radiusSel').value;
  const { lat, lng } = currentPos;

  $('results').innerHTML = '<div class="loading">🔎 주변 흡연구역을 검색하는 중…</div>';
  $('statusLine').textContent = `반경 ${fmtDist(radius)} 검색 중…`;
  $('count').textContent = '–';

  if (searchCircle) searchCircle.setMap(null);
  searchCircle = new naver.maps.Circle({
    map,
    center: new naver.maps.LatLng(lat, lng),
    radius,
    strokeColor: '#ff7a45',
    strokeWeight: 1.5,
    strokeOpacity: 0.5,
    fillColor: '#ff7a45',
    fillOpacity: 0.05,
  });

  const query = `[out:json][timeout:20];(node["amenity"="smoking_area"](around:${radius},${lat},${lng});way["amenity"="smoking_area"](around:${radius},${lat},${lng});node["smoking"="dedicated"](around:${radius},${lat},${lng}););out center tags;`;

  let data = null;
  for (const ep of OVERPASS_ENDPOINTS) {
    try {
      const res = await fetch(ep, { method: 'POST', body: 'data=' + encodeURIComponent(query) });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      data = await res.json();
      break;
    } catch (e) {}
  }
  searching = false;

  const seen = new Set();
  const osmSpots = (data ? data.elements : [])
    .map((el) => {
      const p = el.type === 'node' ? { lat: el.lat, lng: el.lon } : { lat: el.center?.lat, lng: el.center?.lon };
      if (p.lat == null) return null;
      const key = p.lat.toFixed(5) + ',' + p.lng.toFixed(5);
      if (seen.has(key)) return null;
      seen.add(key);
      return { ...p, tags: el.tags || {}, src: 'osm', d: distM(currentPos, p) };
    })
    .filter(Boolean);

  const govSpots = koreaSpots
    .map((s) => ({ lat: s.la, lng: s.lo, name: s.n, tags: {}, src: 'gov', d: distM(currentPos, { lat: s.la, lng: s.lo }) }))
    .filter((s) => s.d <= radius)
    .filter((s) => !osmSpots.some((o) => distM(s, o) < 30));

  const spots = [...osmSpots, ...govSpots].sort((a, b) => a.d - b.d);

  if (!data && !spots.length) {
    $('results').innerHTML = '<div class="empty"><div class="big">⚠️</div>검색 서버에 연결하지 못했어요.<br>잠시 후 다시 시도해 주세요.</div>';
    $('statusLine').textContent = '검색 실패';
    return;
  }
  if (!data) toast('OSM 서버 연결 실패 — 공공데이터만 표시 중');

  renderResults(spots, radius);
}

/* ── 이름/태그 ── */
function spotName(s) {
  if (s.src === 'gov') return s.name || '흡연구역';
  const t = s.tags;
  return t['name:ko'] || t.name || (t.shelter === 'yes' ? '흡연 부스' : '흡연구역');
}
function spotTags(s) {
  const out = [];
  if (s.src === 'gov') { out.push('🏛 공공데이터'); return out; }
  const t = s.tags;
  if (t.shelter === 'yes' || t.covered === 'yes') out.push('🏠 지붕 있음');
  if (t.indoor === 'yes') out.push('실내');
  if (t.access === 'private' || t.access === 'customers') out.push('🔒 이용 제한');
  if (t.bin === 'yes') out.push('🗑 재떨이');
  if (t.lit === 'yes') out.push('💡 조명');
  return out;
}

/* ── 길찾기 링크 ── */
function naverWalkUrl(s) {
  return `https://map.naver.com/p/directions/${currentPos.lng},${currentPos.lat},${encodeURIComponent('출발 위치')}/${s.lng},${s.lat},${encodeURIComponent(spotName(s))}/-/walk`;
}
function kakaoWalkUrl(s) {
  return `https://map.kakao.com/link/to/${encodeURIComponent(spotName(s))},${s.lat},${s.lng}`;
}

/* ── 경로 표시 ── */
function clearRoute() {
  if (routeLine) { routeLine.setMap(null); routeLine = null; }
  if (infoWin) infoWin.close();
  $('routeBar').classList.remove('show');
  document.querySelectorAll('.card.active').forEach((c) => c.classList.remove('active'));
  if (selectedIdx >= 0 && spotMarkers[selectedIdx]) {
    setPinIcon(spotMarkers[selectedIdx], currentSpots[selectedIdx], selectedIdx, false);
  }
  selectedIdx = -1;
}
function setPinIcon(mk, s, i, selected) {
  mk.setIcon({
    content: `<div class="pin ${s.src === 'gov' ? 'gov' : ''} ${selected ? 'sel' : ''}"><span>${i + 1}</span></div>`,
    anchor: new naver.maps.Point(selected ? 19 : 15, selected ? 36 : 28),
  });
  mk.setZIndex(selected ? 250 : 100);
}
$('rbClose').addEventListener('click', clearRoute);

async function selectSpot(i) {
  const s = currentSpots[i];
  const mk = spotMarkers[i];
  if (!s || !mk) return;
  clearRoute();
  selectedIdx = i;
  setPinIcon(mk, s, i, true);
  const card = document.querySelectorAll('.card')[i];
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // 즉시: 직선 점선 + 추정 시간
  let mins = walkMin(s.d), dist = s.d, real = false;
  routeLine = new naver.maps.Polyline({
    map,
    path: [new naver.maps.LatLng(currentPos.lat, currentPos.lng), new naver.maps.LatLng(s.lat, s.lng)],
    strokeColor: '#2f6fef',
    strokeWeight: 4,
    strokeOpacity: 0.55,
    strokeStyle: 'shortdash',
  });

  // 실제 보행 경로 (무료 라우팅)
  try {
    const r = await fetch(`https://routing.openstreetmap.de/routed-foot/route/v1/foot/${currentPos.lng},${currentPos.lat};${s.lng},${s.lat}?overview=full&geometries=geojson`);
    const j = await r.json();
    if (selectedIdx !== i) return; // 사이에 다른 선택
    if (j.routes && j.routes[0]) {
      const rt = j.routes[0];
      mins = Math.max(1, Math.round(rt.duration / 60));
      dist = rt.distance;
      real = true;
      if (routeLine) routeLine.setMap(null);
      routeLine = new naver.maps.Polyline({
        map,
        path: rt.geometry.coordinates.map((c) => new naver.maps.LatLng(c[1], c[0])),
        strokeColor: '#2f6fef',
        strokeWeight: 5,
        strokeOpacity: 0.85,
        strokeLineCap: 'round',
        strokeLineJoin: 'round',
      });
    }
  } catch (e) {}

  // 정보창 + 하단 바
  infoWin.setContent(`<div class="iw"><b>${spotName(s)}</b><br><span class="g">🚶 도보 ${mins}분</span> · ${fmtDist(dist)}${real ? '' : ' (직선 기준)'}</div>`);
  infoWin.open(map, mk);
  $('rbWalk').textContent = `🚶 도보 ${mins}분`;
  $('rbDist').textContent = fmtDist(dist) + (real ? ' · 실제 경로' : ' · 직선 기준');
  $('rbNaver').href = naverWalkUrl(s);
  $('rbKakao').href = kakaoWalkUrl(s);
  $('routeBar').classList.add('show');

  // 두 지점이 다 보이게
  const b = new naver.maps.LatLngBounds();
  b.extend(new naver.maps.LatLng(currentPos.lat, currentPos.lng));
  b.extend(new naver.maps.LatLng(s.lat, s.lng));
  map.fitBounds(b, { top: 70, right: 70, bottom: 90, left: 70 });
}

/* ── 결과 렌더링 ── */
function renderResults(spots, radius) {
  clearRoute();
  spotMarkers.forEach((m) => m.setMap(null));
  spotMarkers = [];
  currentSpots = spots;
  $('count').textContent = `${spots.length}곳`;
  $('statusLine').textContent = `반경 ${fmtDist(radius)} 이내 · 가까운 순`;

  const wrap = $('results');
  if (!spots.length) {
    wrap.innerHTML = `<div class="empty"><div class="big">🍃</div>반경 ${fmtDist(radius)} 안에<br>등록된 흡연구역이 없어요.<br><br>반경을 넓히거나 다른 위치를<br>검색해 보세요.</div>`;
    return;
  }

  wrap.innerHTML = '';
  spots.forEach((s, i) => {
    const mk = new naver.maps.Marker({
      position: new naver.maps.LatLng(s.lat, s.lng),
      map,
    });
    setPinIcon(mk, s, i, false);
    naver.maps.Event.addListener(mk, 'click', () => selectSpot(i));
    spotMarkers.push(mk);

    const card = document.createElement('div');
    card.className = 'card';
    const tags = spotTags(s).map((t) => `<span class="tag">${t}</span>`).join('');
    card.innerHTML = `
      <div class="row1">
        <div class="num ${s.src === 'gov' ? 'gov' : ''}">${i + 1}</div>
        <div class="name">${spotName(s)}</div>
        <div class="dist">${fmtDist(s.d)}</div>
      </div>
      <div class="meta">
        <span class="walk">🚶 도보 약 ${walkMin(s.d)}분</span>
        ${tags}
      </div>
      <div class="links">
        <a class="nv" href="${naverWalkUrl(s)}" target="_blank" rel="noopener">네이버 도보 길찾기</a>
        <a href="${kakaoWalkUrl(s)}" target="_blank" rel="noopener">카카오맵</a>
      </div>`;
    card.addEventListener('click', (e) => {
      if (e.target.tagName === 'A') return;
      selectSpot(i);
    });
    wrap.appendChild(card);
  });

  // 전체가 보이게 (상위 10곳)
  const b = new naver.maps.LatLngBounds();
  b.extend(new naver.maps.LatLng(currentPos.lat, currentPos.lng));
  spots.slice(0, 10).forEach((s) => b.extend(new naver.maps.LatLng(s.lat, s.lng)));
  map.fitBounds(b, { top: 60, right: 60, bottom: 60, left: 60 });
}
</script>
